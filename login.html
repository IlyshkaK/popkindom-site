<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PopkinDom 4</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<header class="header">
  <a href="index.html" class="brand" aria-label="PopkinDom 4"><i data-lucide="crown"></i><span>POPKIN<span>DOM</span></span></a>
  <nav class="nav">
    <a href="index.html">Главная</a>
    <a href="rules.html">Правила</a>
    <a href="about.html">Подробней</a>
  </nav>

  <div class="auth-menu-wrap">
    <a href="login.html" class="register-btn auth-action-btn" id="authMenuBtn">
      <span class="auth-action-icon"><i data-lucide="log-in"></i></span>
      <b class="auth-action-text">Войти</b>
    </a>
    <div class="auth-dropdown" id="authDropdown">
      <a href="account.html"><i data-lucide="user-round"></i><b>Кабинет</b></a>
      <a href="security.html"><i data-lucide="shield"></i><b>Безопасность</b></a>
      <a href="admin.html" class="admin-only"><i data-lucide="shield-check"></i><b>Админ-панель</b></a>
      <span class="auth-dropdown-divider"></span>
      <button type="button" class="auth-dropdown-logout" data-logout><i data-lucide="log-out"></i><b>Выйти из аккаунта</b></button>
    </div>
  </div>
  
  <button class="burger" id="burgerBtn" aria-label="Открыть меню">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Главная</a>
  <a href="rules.html">Правила</a>
  <a href="about.html">Подробней</a>
  <a href="login.html" class="mobile-register auth-action-mobile">Войти</a>
  <a href="account.html" class="mobile-auth-link auth-only"><i data-lucide="user-round"></i> Кабинет</a>
  <a href="security.html" class="mobile-auth-link auth-only"><i data-lucide="shield"></i> Безопасность</a>
  <a href="admin.html" class="mobile-auth-link auth-only admin-only"><i data-lucide="shield-check"></i> Админ-панель</a>
  <button type="button" class="mobile-auth-link auth-only mobile-auth-logout" data-logout><i data-lucide="log-out"></i> Выйти из аккаунта</button>
</div>

<main class="auth-page">
  <div class="auth-bg"></div><div class="auth-dark"></div>
  <section class="auth-card glass-card">
    <div class="auth-logo"><img src="logo.png" alt="PopkinDom"></div>
    <h1>Вход в аккаунт</h1>
    <p class="auth-subtitle">Войди в аккаунт, чтобы открыть личный кабинет.</p>
    <form class="auth-form" id="loginForm">
      <label>Ник в Minecraft<input type="text" id="loginUsername" placeholder="Введите ваш игровой ник" minlength="3" maxlength="16" required></label>
      <label>Пароль<input type="password" id="loginPassword" placeholder="Введите ваш пароль" minlength="8" required></label>
      <button type="submit" class="auth-submit">Войти</button>
      <p class="auth-message" id="loginMessage"></p>
    </form>
    <div class="auth-divider" aria-hidden="true"></div>
    <div class="auth-bottom">
      <p>Нет аккаунта?</p>
      <a href="register.html" class="auth-second-btn">Зарегистрироваться</a>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
